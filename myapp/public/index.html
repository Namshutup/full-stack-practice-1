<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Test Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚀 AWS Test Website</h1>

    <p>If you can see this page, your Node.js server is working!</p>

    <button id="btn">Click Me</button>

    <p id="message"></p>

    <div class="counter">
        Counter:
        <span id="count">0</span>
    </div>

    <button id="plus">+1</button>
    <button id="reset">Reset</button>
</div>

<script src="script.js"></script>

</body>
</html>
